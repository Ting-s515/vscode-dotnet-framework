<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-light.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <style>
    :root {
      color-scheme: light;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "Noto Sans TC", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f8fa;
      color: #1f2328;
    }
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      max-width: 1400px;
      margin: 0 auto;
      min-height: 100vh;
    }
    nav.sidebar {
      background: #fff;
      border-right: 1px solid #d1d9e0;
      padding: 24px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    nav.sidebar h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #59636e;
      margin: 0 0 12px;
      padding: 0 10px;
    }
    nav.sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0 0 24px;
    }
    nav.sidebar li {
      margin: 2px 0;
    }
    nav.sidebar a {
      display: block;
      padding: 6px 10px;
      border-radius: 6px;
      color: #1f2328;
      text-decoration: none;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }
    nav.sidebar a:hover {
      background: #eaeef2;
    }
    nav.sidebar li.active > a {
      background: #ddf4ff;
      color: #0969da;
      font-weight: 600;
    }
    main {
      padding: 32px 48px;
      background: #fff;
      min-width: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 100%;
    }
    .markdown-body pre.mermaid {
      background: #f6f8fa;
      padding: 16px;
      text-align: center;
      overflow-x: auto;
    }
    .markdown-body pre.mermaid svg {
      max-width: 100%;
      height: auto;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      nav.sidebar { position: static; height: auto; max-height: 240px; }
      main { padding: 16px; }
    }
    .doc-footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid #d1d9e0;
      font-size: 12px;
      color: #59636e;
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <h2>docs/</h2>
      <ul>
        {{NAV}}
      </ul>
      <p style="padding: 0 10px; font-size: 11px; color: #59636e; line-height: 1.5;">
        由 <code>scripts/build-docs-html.ps1</code> 自動產生，原始檔為 <code>docs/*.md</code>。
      </p>
    </nav>
    <main>
      <article class="markdown-body">
        {{BODY}}
        <div class="doc-footer">
          原始檔：<code>{{SOURCE}}</code> · 產生時間：{{TIMESTAMP}}
        </div>
      </article>
    </main>
  </div>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'default', securityLevel: 'loose' });
  </script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/powershell.min.js"></script>
  <script>
    if (window.hljs) {
      document.querySelectorAll('pre code').forEach((block) => {
        if (!block.parentElement.classList.contains('mermaid')) {
          hljs.highlightElement(block);
        }
      });
    }
  </script>
</body>
</html>
